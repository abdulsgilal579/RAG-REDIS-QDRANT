services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      - qdrant
      - redis
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - PDF_PATH=${PDF_PATH:-data/Abdul Samad Gilal Resume.pdf}
    volumes:
      - ./data:/app/data
    stdin_open: true
    tty: true

volumes:
  qdrant_storage:
